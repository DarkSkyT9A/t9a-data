<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T9A Data - Global Statistics</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $(document).ready(function () {
      $.getJSON("globalStats.json")
        .done(function (data) {
          let globalStatsHtml = '';
          globalStatsHtml += `<tr><td>Tournament Types</td><td>${data.tournamentType}</td></tr>`;
          globalStatsHtml += `<tr><td>Tournaments</td><td>${data.tournamentsWithReports}</td></tr>`;
          globalStatsHtml += `<tr><td>Games</td><td>${data.games}</td></tr>`;
          globalStatsHtml += `<tr><td>From</td><td>${data.startDate}</td></tr>`;
          globalStatsHtml += `<tr><td>To</td><td>${data.endDate}</td></tr>`;
          $('#globalStatsTable').html('<tr><th>Metric</th><th>Value</th></tr>' + globalStatsHtml);

          let gameWideStatsHtml = '';
          const avgFirst = (data.pointsFirstTurn.reduce((a, b) => a + b, 0) / data.pointsFirstTurn.length).toFixed(1);
          const avgSecond = (data.pointsSecondTurn.reduce((a, b) => a + b, 0) / data.pointsSecondTurn.length).toFixed(1);
          const decisive = data.pointsFirstTurn.filter(p => p >= 18 && p <= 20).length + data.pointsSecondTurn.filter(p => p >= 18 && p <= 20).length;
          const normal = data.pointsFirstTurn.filter(p => p >= 14 && p <= 17).length + data.pointsSecondTurn.filter(p => p >= 14 && p <= 17).length;
          const close = data.pointsFirstTurn.filter(p => p >= 10 && p <= 13).length + data.pointsSecondTurn.filter(p => p >= 10 && p <= 13).length;
          const total = data.pointsFirstTurn.length;
          
          gameWideStatsHtml += `<tr><td>Average points going first</td><td>${avgFirst}</td></tr>`;
          gameWideStatsHtml += `<tr><td>Average points going second</td><td>${avgSecond}</td></tr>`;
          gameWideStatsHtml += `<tr><td>Decisive Games (18-20)</td><td>${decisive} / ${Math.round(decisive / total * 100)}%</td></tr>`;
          gameWideStatsHtml += `<tr><td>'Normal' Games (14-17)</td><td>${normal} / ${Math.round(normal / total * 100)}%</td></tr>`;
          gameWideStatsHtml += `<tr><td>Close    Games (10-13)</td><td>${close} / ${Math.round(close / total * 100)}%</td></tr>`;
          $('#gameWideStatsTable').html('<tr><th>Metric</th><th>Value</th></tr>' + gameWideStatsHtml);

          // Setup Map Statistics
          let setupMapHtml = '';
          const mapData = data.setup.map;
          
          // Calculate Vetia and Taphria totals
          let vetiaTotal = 0;
          let taphriaTotal = 0;
          
          // Sort map entries to group Vetia and Taphria together
          const sortedMaps = Object.entries(mapData).sort((a, b) => {
            // Extract map type and number
            const aType = a[0].split(' ')[0];
            const bType = b[0].split(' ')[0];
            const aNum = parseInt(a[0].split(' ')[1]);
            const bNum = parseInt(b[0].split(' ')[1]);
            
            // Sort by type first, then by number
            if (aType !== bType) {
              return aType.localeCompare(bType);
            }
            return aNum - bNum;
          });
          
          // Build table rows and calculate totals
          sortedMaps.forEach(([mapName, count]) => {
            setupMapHtml += `<tr><td>${mapName}</td><td>${count}</td></tr>`;
            
            if (mapName.startsWith('Vetia')) {
              vetiaTotal += count;
            } else if (mapName.startsWith('Taphria')) {
              taphriaTotal += count;
            }
          });
          
          // Add summary rows for Vetia and Taphria
          setupMapHtml += `<tr style="font-weight: bold; border-top: 2px solid #4682B4;"><td>Taphria Total</td><td>${taphriaTotal}</td></tr>`;
          setupMapHtml += `<tr style="font-weight: bold;"><td>Vetia Total</td><td>${vetiaTotal}</td></tr>`;
          
          $('#setupMapTable').html('<tr><th>Map</th><th>Count</th></tr>' + setupMapHtml);

          // Setup Deployment Statistics
          let setupDeploymentHtml = '';
          const deploymentData = data.setup.deployment;
          
          // Sort deployment entries alphabetically
          const sortedDeployments = Object.entries(deploymentData).sort((a, b) => a[0].localeCompare(b[0]));
          
          // Build table rows with deployment name, games played, and average points
          sortedDeployments.forEach(([deploymentName, pointsArray]) => {
            const gamesPlayed = pointsArray.length;
            const avgPoints = (pointsArray.reduce((a, b) => a + b, 0) / gamesPlayed).toFixed(1);
            setupDeploymentHtml += `<tr><td>${deploymentName}</td><td>${gamesPlayed}</td><td>${avgPoints}</td></tr>`;
          });
          
          $('#setupDeploymentTable').html('<tr><th>Deployment</th><th>Games played</th><th>1st turn ØPts</th></tr>' + setupDeploymentHtml);

        })
        .fail(function (jqxhr, textStatus, error) {
          console.log("Request Failed: " + textStatus + ", " + error);
        });
    });
  </script>
</head>
<body>
  <h1>T9A Data - Global Statistics</h1>
  
  <table id="globalStatsTable">
    <tr>
      <th>Metric</th>
      <th>Value</th>
    </tr>
  </table>

  <h1>Game Wide Data</h1>

  <table id="gameWideStatsTable">
    <tr>
      <th>Metric</th>
      <th>Value</th>
    </tr>
  </table>

  <h1>Setup - Map Statistics</h1>

  <table id="setupMapTable">
    <tr>
      <th>Map</th>
      <th>Count</th>
    </tr>
  </table>

  <h1>Setup - Deployment Statistics</h1>

  <table id="setupDeploymentTable">
    <tr>
      <th>Deployment</th>
      <th>Games played</th>
      <th>1st turn ØPts</th>
    </tr>
  </table>

</body>
</html>
