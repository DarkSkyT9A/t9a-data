<html>
  <title>T9A Data - Global Statistics</title>
  <h1>T9A Data - Global Statistics</h1>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script>
    $(document).ready(function() {
        $.getJSON('../output/globalStats.json', function(data) {  // Change file name as needed
          let content = `<p>Tournaments with Reports: ${data.tournamentsWithReports}</p>`;
          $('#data-container').html(content);
          let games = `<p>Games in Report: ${data.games}</p>`;
          $('#data-container').html(games);
        });
    });
</script>
  <table>
    <tr>
      <th>Global Statistics</th>
      <th>Amount</th>
    </tr>
    <tr>
      <td>Tournaments</td>
      <td>...</td>
    </tr>
    <tr>
      <td>Games</td>
      <td>...</td>
    </tr>
    <script>
      $(document).ready(function () {
        $.getJSON("../output/globalStats.json", function (data) {
          let tournaments = `<tr><td>Tournaments</td><td>${data.tournamentsWithReports}</td></tr>`;
          $('#table').append(tournaments);
          let games = `<tr><td>Games</td><td>${data.games}</td></tr>`;
          $('#table').append(games);
        });
      });
    </script>
  </table>
</html>
